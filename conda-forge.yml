build_platform:
  linux_ppc64le: linux_64
  osx_64: osx_arm64
  # linux_riscv64: linux_64
  # linux_s390x: linux_64
  # win_arm64: linux_64
# Use real native runners for osx_arm64 + linux_aarch64 instead of
# cross-compile-from-x64.  Avoids Azure macOS-x64 agent abandonment
# pattern on long osx_64-native builds (we were hitting it on every
# 0.16 attempt).  Per Wolf, conda-forge has the arm64 runner pools
# available; just need to opt in.
provider:
  osx_arm64: default
  linux_aarch64: default
conda_build_tool: rattler-build
conda_install_tool: pixi
github:
  branch_name: main
  tooling_branch_name: main
conda_build:
  error_overlinking: true
conda_forge_output_validation: true
