build_platform:
  linux_ppc64le: linux_64
  # linux_riscv64: linux_64
  # linux_s390x: linux_64
  # win_arm64: linux_64
# osx_arm64 + linux_aarch64 build on real native runners.  osx_64 builds
# *natively* on an Intel macOS agent (no build_platform mapping) — we
# tried cross-compiling osx_64 from osx_arm64 (#5) and the arm64 zig
# panics ("reached unreachable code") generating the x86_64-macos slice,
# so we let a native x86_64 zig handle it instead.
provider:
  osx_arm64: default
  linux_aarch64: default
conda_build_tool: rattler-build
conda_install_tool: pixi
github:
  branch_name: main
  tooling_branch_name: main
conda_build:
  error_overlinking: true
conda_forge_output_validation: true
